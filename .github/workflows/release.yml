# Iteration 27: automated release packaging.
#
# On tag push (v*) or manual dispatch, build the Vue bundles and produce a
# zip that's ready to drop into a Nextcloud `apps/` directory. Attaches the
# zip to the GitHub release automatically.
#
# Why this exists: the fork's `js/` bundles are .gitignore'd and only
# produced by CI, so a plain `wget /archive/refs/heads/master.tar.gz`
# gives users a broken app. The release zip includes the built bundles
# so `install` is a one-step extract + enable.
#
# @Code Changes by: Kim Haverblad, 2026

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.9.3). Only used for the artifact name.'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build production bundles
        run: npm run build

      - name: Confirm bundles were produced
        run: |
          ls -la js/
          test -f js/integration_suitecrm-personalSettings.js
          test -f js/integration_suitecrm-adminSettings.js
          test -f js/integration_suitecrm-dashboard.js

      - name: Package for Nextcloud app store
        id: package
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          STAGING=/tmp/pkg
          mkdir -p "${STAGING}/integration_suitecrm"

          # Copy everything into the staging dir, then remove things that
          # shouldn't ship. Using find + rm rather than rsync excludes so
          # the exclusion list stays obvious in the log output.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.l10nignore' \
            --exclude='.tx/' \
            --exclude='node_modules/' \
            --exclude='src/' \
            --exclude='tests/' \
            --exclude='phpunit.xml' \
            --exclude='phpstan.neon' \
            --exclude='eslint.config.mjs' \
            --exclude='stylelint.config.js' \
            --exclude='webpack.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='codeception.yml' \
            --exclude='Makefile' \
            --exclude='makefile' \
            --exclude='docker/' \
            --exclude='.editorconfig' \
            --exclude='.prettierrc*' \
            ./ "${STAGING}/integration_suitecrm/"

          # Show what we're shipping
          echo "--- Package contents ---"
          find "${STAGING}/integration_suitecrm" -type f | sort | head -60
          echo "--- Total size ---"
          du -sh "${STAGING}/integration_suitecrm"

          # Build the zip
          ZIP="/tmp/integration_suitecrm-${VERSION}.zip"
          (cd "${STAGING}" && zip -r "${ZIP}" integration_suitecrm/)
          ls -la "${ZIP}"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Create/update GitHub Release with asset
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          body: |
            Automated build for ${{ steps.version.outputs.version }}.

            **Install:** download `integration_suitecrm-${{ steps.version.outputs.version }}.zip` below, extract into your Nextcloud `apps/` directory, then enable via **Apps → Integration → SuiteCRM integration**.

            This zip includes pre-built `js/` bundles — no `npm run build` needed on the target server.

            See [README](https://github.com/njordium/integration_suitecrm/blob/master/README.md) for admin setup and troubleshooting.

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: integration_suitecrm-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.zip }}
          retention-days: 30
